# rift configuration -- a port of the niri setup, carrying over the aerospace
# era's app placement. Managed by nix; edit here and rebuild (hot_reload picks
# up the swapped symlink).

[settings]
# niri: animations on (default speed).
animate = true
animation_duration = 0.2
animation_fps = 100.0

# niri: warp-mouse-to-focus on, focus-follows-mouse off.
focus_follows_mouse = false
mouse_follows_focus = true
mouse_hides_on_focus = true

hot_reload = true

# aerospace used to start borders from its after-startup-command; rift takes
# over that duty.
run_on_start = ["borders"]

[settings.layout]
mode = "scrolling"

[settings.layout.gaps.outer]
# top leaves room for sketchybar, as the aerospace config did.
top = 40
left = 10
bottom = 10
right = 10

[settings.layout.gaps.inner]
horizontal = 10
vertical = 10

[settings.layout.scrolling]
# niri: default-column-width 0.5, presets 1/3..2/3.
column_width_ratio = 0.5
min_column_width_ratio = 0.33333
max_column_width_ratio = 0.66667
# niri: center-focused-column "never".
alignment = "left"
focus_navigation_style = "niri"

[settings.layout.scrolling.gestures]
enabled = true
fingers = 3

[virtual_workspaces]
enabled = true
default_workspace_count = 9
# Indices are 0-based; the names keep the display 1-based to match the binds
# below. If Alt+N ever lands one workspace off, adjust the indices, not the
# muscle memory.
workspace_names = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]
auto_assign_windows = true
preserve_focus_per_workspace = true
# aerospace: ctrl-space toggled back and forth; here any Alt+N re-press does.
workspace_auto_back_and_forth = true

# App placement, carried over from the aerospace on-window-detected rules.
# Workspace indices are 0-based: 0 = "1" (terminal), etc. The floating
# Picture-in-Picture rules come first in case matching is first-wins.
app_rules = [
  { app_id = "app.zen-browser.zen", title_substring = "Picture-in-Picture", floating = true },
  { app_id = "app.zen-browser.zen", title_substring = "ピクチャーインピクチャー", floating = true },
  { app_id = "org.mozilla.firefox", title_substring = "Picture-in-Picture", floating = true },
  { app_id = "org.mozilla.firefox", title_substring = "ピクチャーインピクチャー", floating = true },

  { app_id = "com.github.wez.wezterm", workspace = 0 },
  { app_id = "app.zen-browser.zen", workspace = 1 },
  { app_id = "md.obsidian", workspace = 2 },
  { app_id = "com.tinyspeck.slackmacgap", workspace = 3 },
  { app_id = "notion.id", workspace = 4 },
  { app_id = "com.spotify.client", workspace = 5 },
  { app_id = "com.hnc.Discord", workspace = 6 },
  { app_id = "com.toggl.daneel", workspace = 7 },
]

[keys]
"Alt + Z" = "toggle_space_activated"

# Focus / move: shared muscle memory between niri and aerospace.
"Alt + H" = { move_focus = "left" }
"Alt + J" = { move_focus = "down" }
"Alt + K" = { move_focus = "up" }
"Alt + L" = { move_focus = "right" }

"Alt + Shift + H" = { move_node = "left" }
"Alt + Shift + J" = { move_node = "down" }
"Alt + Shift + K" = { move_node = "up" }
"Alt + Shift + L" = { move_node = "right" }

# Workspaces: Alt+N focuses, Alt+Shift+N sends (aerospace style).
"Alt + 1" = { switch_to_workspace = 0 }
"Alt + 2" = { switch_to_workspace = 1 }
"Alt + 3" = { switch_to_workspace = 2 }
"Alt + 4" = { switch_to_workspace = 3 }
"Alt + 5" = { switch_to_workspace = 4 }
"Alt + 6" = { switch_to_workspace = 5 }
"Alt + 7" = { switch_to_workspace = 6 }
"Alt + 8" = { switch_to_workspace = 7 }
"Alt + 9" = { switch_to_workspace = 8 }

"Alt + Shift + 1" = { move_window_to_workspace = 0 }
"Alt + Shift + 2" = { move_window_to_workspace = 1 }
"Alt + Shift + 3" = { move_window_to_workspace = 2 }
"Alt + Shift + 4" = { move_window_to_workspace = 3 }
"Alt + Shift + 5" = { move_window_to_workspace = 4 }
"Alt + Shift + 6" = { move_window_to_workspace = 5 }
"Alt + Shift + 7" = { move_window_to_workspace = 6 }
"Alt + Shift + 8" = { move_window_to_workspace = 7 }
"Alt + Shift + 9" = { move_window_to_workspace = 8 }

# niri: Alt+U/I walk workspaces; aerospace: alt-tab bounced back and forth.
"Alt + U" = "next_workspace"
"Alt + I" = "prev_workspace"
"Alt + Tab" = "switch_to_last_workspace"

# niri: Alt+F maximize-column, Alt+Shift+F fullscreen -- note this is the
# reverse of rift's default binds.
"Alt + F" = "toggle_fullscreen_within_gaps"
"Alt + Shift + F" = "toggle_fullscreen"

# niri: Alt+V toggles floating.
"Alt + V" = "toggle_window_floating"

# niri: Alt+W tabbed column; stacking is rift's nearest equivalent.
"Alt + W" = "toggle_stack"

# niri: Alt+Minus / Alt+Shift+Equal width adjustments.
"Alt + Minus" = "resize_window_shrink"
"Alt + Shift + Equal" = "resize_window_grow"

"Alt + Enter" = { exec = ["/bin/sh", "-c", "open -a WezTerm"] }

# No rift equivalents yet: close-window (Cmd+W territory on macOS),
# center-column, preset-width cycling.
